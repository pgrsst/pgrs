name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os-name }}/${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            os-name: linux
            arch: amd64
            target: x86_64-unknown-linux-gnu
            ext: ""
            test: true
          - runner: ubuntu-latest
            os-name: linux
            arch: arm64
            target: aarch64-unknown-linux-gnu
            ext: ""
            test: false
          - runner: macos-latest
            os-name: darwin
            arch: amd64
            target: x86_64-apple-darwin
            ext: ""
            test: false
          - runner: macos-latest
            os-name: darwin
            arch: arm64
            target: aarch64-apple-darwin
            ext: ""
            test: true
          - runner: windows-latest
            os-name: windows
            arch: amd64
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            test: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Check
        run: cargo check --target ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --target ${{ matrix.target }} -- -D warnings

      - name: Test
        if: matrix.test
        run: cargo test --target ${{ matrix.target }}

      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          cp "target/${{ matrix.target }}/release/pgrs${{ matrix.ext }}" \
             "pgrs-${VERSION}-${{ matrix.os-name }}-${{ matrix.arch }}${{ matrix.ext }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: pgrs-${{ github.event.release.tag_name }}-${{ matrix.os-name }}-${{ matrix.arch }}${{ matrix.ext }}
